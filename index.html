<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE ARCADE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-green: #00ff41;
    --neon-pink: #ff006e;
    --neon-yellow: #ffd60a;
    --neon-cyan: #00f5ff;
    --dark: #060a06;
    --dark2: #0d140d;
    --grid: #0a1a0a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    font-family: 'Press Start 2P', monospace;
    color: var(--neon-green);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 998;
  }

  /* Starfield background */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--neon-green);
    border-radius: 50%;
    opacity: 0.3;
    animation: twinkle var(--d, 3s) infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to { opacity: 0.5; transform: scale(1.2); }
  }

  .arcade-cabinet {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Title */
  .title-wrap {
    text-align: center;
    margin-bottom: 20px;
  }

  .title {
    font-size: clamp(20px, 4vw, 36px);
    color: var(--neon-yellow);
    text-shadow:
      0 0 10px var(--neon-yellow),
      0 0 30px var(--neon-yellow),
      0 0 60px rgba(255,214,10,0.4);
    letter-spacing: 8px;
    animation: flicker 4s infinite;
  }

  .subtitle {
    font-size: 8px;
    color: var(--neon-pink);
    text-shadow: 0 0 8px var(--neon-pink);
    margin-top: 8px;
    letter-spacing: 3px;
    animation: pulse 2s infinite;
  }

  @keyframes flicker {
    0%,94%,100% { opacity: 1; }
    95% { opacity: 0.4; }
    97% { opacity: 1; }
    99% { opacity: 0.6; }
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Screen frame */
  .screen-frame {
    background: #020802;
    border: 4px solid var(--neon-green);
    box-shadow:
      0 0 0 2px #000,
      0 0 20px var(--neon-green),
      0 0 60px rgba(0,255,65,0.3),
      inset 0 0 30px rgba(0,0,0,0.8);
    padding: 4px;
    position: relative;
  }

  /* Corner decorations */
  .screen-frame::before, .screen-frame::after {
    content: '◆';
    position: absolute;
    font-size: 10px;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px var(--neon-yellow);
  }
  .screen-frame::before { top: -2px; left: -2px; }
  .screen-frame::after { bottom: -2px; right: -2px; }

  canvas {
    display: block;
    image-rendering: pixelated;
  }

  /* HUD below canvas */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-top: 16px;
    padding: 0 4px;
  }

  .hud-box {
    text-align: center;
  }

  .hud-label {
    font-size: 7px;
    color: var(--neon-cyan);
    text-shadow: 0 0 6px var(--neon-cyan);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .hud-value {
    font-size: clamp(14px, 2vw, 20px);
    color: var(--neon-yellow);
    text-shadow: 0 0 10px var(--neon-yellow), 0 0 20px rgba(255,214,10,0.5);
    transition: transform 0.1s, color 0.1s;
  }

  .hud-value.bump {
    transform: scale(1.4);
    color: #fff;
  }

  /* Controls */
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 10px 18px;
    background: transparent;
    border: 2px solid var(--neon-green);
    color: var(--neon-green);
    text-shadow: 0 0 6px var(--neon-green);
    box-shadow: 0 0 10px rgba(0,255,65,0.3), inset 0 0 10px rgba(0,255,65,0.05);
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.1s;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--neon-green);
    opacity: 0;
    transition: opacity 0.1s;
  }

  .btn:active {
    transform: scale(0.92) translateY(2px);
    box-shadow: 0 0 20px rgba(0,255,65,0.8), inset 0 0 20px rgba(0,255,65,0.3);
    background: rgba(0,255,65,0.15);
  }

  .btn:hover {
    background: rgba(0,255,65,0.1);
    box-shadow: 0 0 20px rgba(0,255,65,0.6);
  }

  .btn.pink {
    border-color: var(--neon-pink);
    color: var(--neon-pink);
    text-shadow: 0 0 6px var(--neon-pink);
    box-shadow: 0 0 10px rgba(255,0,110,0.3);
  }
  .btn.pink:hover { background: rgba(255,0,110,0.1); box-shadow: 0 0 20px rgba(255,0,110,0.6); }
  .btn.pink:active { background: rgba(255,0,110,0.2); box-shadow: 0 0 20px rgba(255,0,110,0.8); }

  /* Key hints */
  .key-hints {
    margin-top: 14px;
    font-size: 7px;
    color: #3a5a3a;
    letter-spacing: 2px;
    text-align: center;
    line-height: 2.2;
  }

  /* Overlay on canvas */
  .overlay {
    position: absolute;
    inset: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(6,10,6,0.88);
    z-index: 5;
  }

  .overlay.hidden { display: none; }

  .overlay-title {
    font-size: clamp(16px, 3vw, 28px);
    color: var(--neon-pink);
    text-shadow: 0 0 20px var(--neon-pink), 0 0 40px rgba(255,0,110,0.5);
    text-align: center;
    animation: flicker 3s infinite;
  }

  .overlay-sub {
    font-size: 9px;
    color: var(--neon-green);
    text-shadow: 0 0 8px var(--neon-green);
    text-align: center;
    line-height: 2;
    animation: pulse 1.5s infinite;
  }

  /* Click burst particles */
  .burst {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    font-size: 18px;
    font-family: 'Press Start 2P', monospace;
    animation: burst-anim 0.6s ease-out forwards;
  }

  @keyframes burst-anim {
    0% { opacity: 1; transform: scale(0.5) translateY(0); }
    100% { opacity: 0; transform: scale(1.5) translateY(-60px); }
  }

  /* Level flash */
  .level-flash {
    position: fixed;
    inset: 0;
    background: rgba(0,255,65,0.08);
    pointer-events: none;
    z-index: 997;
    animation: flash 0.3s ease-out forwards;
  }

  @keyframes flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Mobile d-pad */
  .dpad {
    display: none;
    margin-top: 16px;
    grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(3, 44px);
    gap: 4px;
  }

  @media (max-width: 600px) {
    .dpad { display: grid; }
    .key-hints { display: none; }
  }

  .dpad-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    background: rgba(0,255,65,0.08);
    border: 2px solid var(--neon-green);
    color: var(--neon-green);
    text-shadow: 0 0 6px var(--neon-green);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .dpad-btn:active { background: rgba(0,255,65,0.3); transform: scale(0.9); }
  .dpad-center { grid-column: 2; grid-row: 2; opacity: 0.2; cursor: default; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="arcade-cabinet">
  <div class="title-wrap">
    <div class="title">SNAKE ARCADE</div>
    <div class="subtitle">INSERT COIN TO PLAY</div>
  </div>

  <div style="position:relative;">
    <div class="screen-frame">
      <canvas id="gameCanvas"></canvas>
    </div>

    <div class="overlay" id="overlay">
      <div class="overlay-title" id="overlayTitle">SNAKE!</div>
      <div class="overlay-sub" id="overlaySub">PRESS START<br>OR CLICK TO BEGIN</div>
    </div>
  </div>

  <div class="hud">
    <div class="hud-box">
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="scoreDisplay">0000</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">LEVEL</div>
      <div class="hud-value" id="levelDisplay">01</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">BEST</div>
      <div class="hud-value" id="bestDisplay">0000</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="startBtn">▶ START</button>
    <button class="btn pink" id="resetBtn">↺ RESET</button>
  </div>

  <div class="key-hints">
    WASD / ARROW KEYS — MOVE &nbsp;|&nbsp; P — PAUSE
  </div>

  <div class="dpad">
    <div></div>
    <button class="dpad-btn" id="dUp">▲</button>
    <div></div>
    <button class="dpad-btn" id="dLeft">◄</button>
    <div class="dpad-center">✦</div>
    <button class="dpad-btn" id="dRight">►</button>
    <div></div>
    <button class="dpad-btn" id="dDown">▼</button>
    <div></div>
  </div>
</div>

<script>
// ── Stars ──────────────────────────────────────────────
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = Math.random() * 100 + 'vh';
  s.style.setProperty('--d', (2 + Math.random() * 4).toFixed(1) + 's');
  s.style.animationDelay = (Math.random() * 4).toFixed(1) + 's';
  starsEl.appendChild(s);
}

// ── Canvas setup ───────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const CELL = 18;
const COLS = 22;
const ROWS = 20;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

// ── Game state ─────────────────────────────────────────
let snake, dir, nextDir, food, bonus, score, best, level, speed, gameLoop, paused, running, died;
const DIRS = { UP:[0,-1], DOWN:[0,1], LEFT:[-1,0], RIGHT:[1,0] };

function init() {
  snake = [
    {x:11,y:10},{x:10,y:10},{x:9,y:10},{x:8,y:10}
  ];
  dir = [1,0];
  nextDir = [1,0];
  food = randomFood();
  bonus = null;
  score = 0;
  level = 1;
  speed = 160;
  paused = false;
  died = false;
  updateHUD();
}

function randomFood(exclude=[]) {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while(
    snake.some(s=>s.x===pos.x&&s.y===pos.y) ||
    exclude.some(e=>e&&e.x===pos.x&&e.y===pos.y)
  );
  return pos;
}

// ── Drawing ────────────────────────────────────────────
const COLORS = {
  bg: '#060a06',
  grid: '#0a140a',
  snakeHead: '#00ff41',
  snakeBody: '#00cc33',
  snakeTail: '#006619',
  food: '#ff006e',
  bonus: '#ffd60a',
  glow: 'rgba(0,255,65,0.15)',
};

function drawGrid() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = COLORS.grid;
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke();
  }
}

function drawCell(x, y, color, glow=null, radius=3) {
  const px = x*CELL+1, py = y*CELL+1, sz = CELL-2;
  if (glow) {
    ctx.shadowColor = glow;
    ctx.shadowBlur = 14;
  }
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(px, py, sz, sz, radius);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawSnake() {
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    const isHead = i === 0;
    const isTail = i === snake.length - 1;
    const color = isHead ? COLORS.snakeHead
                : isTail ? COLORS.snakeTail
                : lerpColor(COLORS.snakeBody, COLORS.snakeTail, t);
    drawCell(seg.x, seg.y, color, isHead ? COLORS.snakeHead : null, isHead ? 5 : 3);

    // Eyes on head
    if (isHead) {
      ctx.fillStyle = '#000';
      const [dx, dy] = dir;
      const ex = seg.x*CELL + CELL/2 + dy*4 - dx;
      const ey = seg.y*CELL + CELL/2 + dx*4 - dy;
      ctx.beginPath(); ctx.arc(ex-dy*4, ey-dx*4, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex+dy*4, ey+dx*4, 2, 0, Math.PI*2); ctx.fill();
    }
  });
}

function lerpColor(a, b, t) {
  const parse = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  const [ar,ag,ab] = parse(a), [br,bg,bb] = parse(b);
  return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}

function drawFood() {
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 200);
  ctx.shadowColor = COLORS.food;
  ctx.shadowBlur = 18 * pulse;
  ctx.fillStyle = COLORS.food;
  const cx = food.x*CELL + CELL/2, cy = food.y*CELL + CELL/2;
  const r = (CELL/2 - 3) * pulse;
  ctx.beginPath();
  // Draw apple shape (circle with stem)
  ctx.arc(cx, cy+1, r, 0, Math.PI*2);
  ctx.fill();
  // stem
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#ff66aa';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy-r+1);
  ctx.quadraticCurveTo(cx+5, cy-r-5, cx+4, cy-r-3);
  ctx.stroke();
}

function drawBonus() {
  if (!bonus) return;
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 100);
  ctx.shadowColor = COLORS.bonus;
  ctx.shadowBlur = 22 * pulse;
  ctx.fillStyle = COLORS.bonus;
  const cx = bonus.x*CELL + CELL/2, cy = bonus.y*CELL + CELL/2;
  // Star shape
  drawStar(cx, cy, 5, (CELL/2-2)*pulse, (CELL/4)*pulse, COLORS.bonus);
  ctx.shadowBlur = 0;
}

function drawStar(cx, cy, spikes, outerR, innerR, color) {
  ctx.beginPath();
  for (let i = 0; i < spikes*2; i++) {
    const angle = (i * Math.PI / spikes) - Math.PI/2;
    const r = i%2===0 ? outerR : innerR;
    if (i===0) ctx.moveTo(cx+Math.cos(angle)*r, cy+Math.sin(angle)*r);
    else ctx.lineTo(cx+Math.cos(angle)*r, cy+Math.sin(angle)*r);
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function render() {
  drawGrid();
  drawFood();
  drawBonus();
  drawSnake();
}

// ── Game tick ──────────────────────────────────────────
let bonusTimer = null;
let bonusSpawnTimer = null;

function tick() {
  if (paused || !running) return;
  dir = [...nextDir];
  const head = { x: snake[0].x + dir[0], y: snake[0].y + dir[1] };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
  // Self collision
  if (snake.some(s=>s.x===head.x&&s.y===head.y)) return gameOver();

  snake.unshift(head);

  let grew = false;
  // Food
  if (head.x===food.x && head.y===food.y) {
    grew = true;
    score += 10 * level;
    food = randomFood([bonus]);
    bumpHUD('scoreDisplay');
    spawnBurst(food.x*CELL+CELL/2, food.y*CELL+CELL/2 + canvas.getBoundingClientRect().top, '+' + (10*level), '#ff006e');

    // Level up every 5 foods
    const newLevel = Math.floor(score / (50*level)) + 1;
    if (newLevel > level) {
      level = newLevel;
      speed = Math.max(60, 160 - (level-1)*18);
      bumpHUD('levelDisplay');
      flashScreen();
      restartLoop();
    }
    updateHUD();
  }
  // Bonus
  if (bonus && head.x===bonus.x && head.y===bonus.y) {
    grew = true;
    score += 50 * level;
    bonus = null;
    clearTimeout(bonusTimer);
    bumpHUD('scoreDisplay');
    spawnBurst(head.x*CELL+CELL/2, head.y*CELL+CELL/2 + canvas.getBoundingClientRect().top, '★ +' + (50*level), '#ffd60a');
    updateHUD();
  }

  if (!grew) snake.pop();

  // Random bonus food spawn
  if (!bonus && Math.random() < 0.008) {
    bonus = randomFood([food]);
    bonusTimer = setTimeout(() => { bonus = null; }, 5000);
  }

  if (score > best) { best = score; localStorage.setItem('snakeBest', best); updateHUD(); }

  render();
}

function restartLoop() {
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, speed);
}

// ── Game over ──────────────────────────────────────────
function gameOver() {
  running = false;
  died = true;
  clearInterval(gameLoop);
  // Flash snake red
  snake.forEach(s => drawCell(s.x, s.y, '#ff0000', '#ff0000', 3));
  setTimeout(() => {
    showOverlay('GAME OVER', 'SCORE: ' + pad(score) + '\n\nPRESS START TO RETRY');
  }, 400);
}

// ── HUD ────────────────────────────────────────────────
function pad(n) { return String(n).padStart(4,'0'); }
function updateHUD() {
  document.getElementById('scoreDisplay').textContent = pad(score);
  document.getElementById('levelDisplay').textContent = String(level).padStart(2,'0');
  document.getElementById('bestDisplay').textContent = pad(best);
}

function bumpHUD(id) {
  const el = document.getElementById(id);
  el.classList.add('bump');
  setTimeout(()=>el.classList.remove('bump'), 150);
}

// ── Overlay ────────────────────────────────────────────
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');

function showOverlay(title, sub) {
  overlayTitle.textContent = title;
  overlaySub.innerHTML = sub.replace(/\n/g,'<br>');
  overlay.classList.remove('hidden');
}
function hideOverlay() { overlay.classList.add('hidden'); }

// ── Controls ───────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', () => startGame());
document.getElementById('resetBtn').addEventListener('click', () => {
  clearInterval(gameLoop);
  running = false;
  init();
  render();
  showOverlay('SNAKE!', 'PRESS START\nOR CLICK TO BEGIN');
});

overlay.addEventListener('click', () => { if(!running) startGame(); });

function startGame() {
  if (died) init();
  died = false;
  running = true;
  hideOverlay();
  restartLoop();
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:'UP', KeyW:'UP',
    ArrowDown:'DOWN', KeyS:'DOWN',
    ArrowLeft:'LEFT', KeyA:'LEFT',
    ArrowRight:'RIGHT', KeyD:'RIGHT',
  };
  if (map[e.code]) {
    e.preventDefault();
    const d = DIRS[map[e.code]];
    // Prevent reversing
    if (!(d[0]===-dir[0] && d[1]===-dir[1])) nextDir = d;
  }
  if (e.code === 'KeyP') {
    if (!running) return;
    paused = !paused;
    if (paused) showOverlay('PAUSED', 'PRESS P TO CONTINUE');
    else hideOverlay();
  }
  if (e.code === 'Enter' || e.code === 'Space') {
    e.preventDefault();
    if (!running) startGame();
    else if (paused) { paused=false; hideOverlay(); }
  }
});

// D-pad
document.getElementById('dUp').addEventListener('click', ()=>{ if(!running){startGame();return;} const d=DIRS.UP; if(!(d[0]===-dir[0]&&d[1]===-dir[1]))nextDir=d; });
document.getElementById('dDown').addEventListener('click', ()=>{ if(!running){startGame();return;} const d=DIRS.DOWN; if(!(d[0]===-dir[0]&&d[1]===-dir[1]))nextDir=d; });
document.getElementById('dLeft').addEventListener('click', ()=>{ if(!running){startGame();return;} const d=DIRS.LEFT; if(!(d[0]===-dir[0]&&d[1]===-dir[1]))nextDir=d; });
document.getElementById('dRight').addEventListener('click', ()=>{ if(!running){startGame();return;} const d=DIRS.RIGHT; if(!(d[0]===-dir[0]&&d[1]===-dir[1]))nextDir=d; });

// ── Click burst ────────────────────────────────────────
document.addEventListener('click', e => {
  if (e.target.closest('.btn') || e.target.closest('.dpad-btn')) {
    spawnBurst(e.clientX, e.clientY, ['★','◆','✦','●'][Math.floor(Math.random()*4)], '#00ff41');
  }
});

function spawnBurst(x, y, text, color) {
  const el = document.createElement('div');
  el.className = 'burst';
  el.textContent = text;
  el.style.left = (x - 20) + 'px';
  el.style.top = (y - 20) + 'px';
  el.style.color = color;
  el.style.textShadow = `0 0 10px ${color}`;
  document.body.appendChild(el);
  el.addEventListener('animationend', ()=>el.remove());
}

// ── Screen flash ───────────────────────────────────────
function flashScreen() {
  const el = document.createElement('div');
  el.className = 'level-flash';
  document.body.appendChild(el);
  el.addEventListener('animationend', ()=>el.remove());
}

// ── Render loop (for animations when paused/idle) ──────
function renderLoop() {
  if (!running || paused) render();
  requestAnimationFrame(renderLoop);
}

// ── Init ───────────────────────────────────────────────
best = parseInt(localStorage.getItem('snakeBest') || '0');
init();
render();
renderLoop();
</script>
